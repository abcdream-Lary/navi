name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Build Windows
      run: flutter build windows --release
      
    - name: Create Portable ZIP
      run: |
        Write-Host "创建便携版 ZIP 包..."
        New-Item -ItemType Directory -Force -Path "Output"
        $sourcePath = "build\windows\x64\runner\Release\*"
        $destPath = "Output\navi-portable-${{ github.ref_name }}.zip"
        Write-Host "源路径: $sourcePath"
        Write-Host "目标路径: $destPath"
        Compress-Archive -Path $sourcePath -DestinationPath $destPath -Force
        if (-not (Test-Path $destPath)) {
          Write-Error "便携版 ZIP 包创建失败"
          exit 1
        }
        Write-Host "便携版 ZIP 包创建完成"
      shell: pwsh
      
    - name: Download Inno Setup
      run: |
        Write-Host "开始下载 Inno Setup..."
        curl -L -o inno-setup.exe https://files.jrsoftware.org/is/6/innosetup-6.2.2.exe
        if (-not (Test-Path "inno-setup.exe")) {
          Write-Error "Inno Setup 下载失败"
          exit 1
        }
        Write-Host "安装 Inno Setup..."
        .\inno-setup.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
        Write-Host "等待安装完成..."
        Start-Sleep -Seconds 10
        Write-Host "复制中文语言文件..."
        if (-not (Test-Path ".github/workflows/ChineseSimplified.isl")) {
          Write-Error "找不到中文语言文件"
          exit 1
        }
        Copy-Item -Path ".github/workflows/ChineseSimplified.isl" -Destination "ChineseSimplified.isl" -Force
        if (-not (Test-Path "ChineseSimplified.isl")) {
          Write-Error "中文语言文件复制失败"
          exit 1
        }
        Write-Host "语言文件复制完成"
      shell: pwsh
      
    - name: Create Inno Setup Script
      run: |
        Write-Host "创建安装脚本..."
        $content = '#define MyAppName "Navi"' + "`n"
        $content += '#define MyAppVersion "' + "${{ github.ref_name }}" + '"' + "`n"
        $version = "${{ github.ref_name }}".TrimStart('v')
        $versionParts = $version.Split('-')[0].Split('.')
        while ($versionParts.Length -lt 4) {
            $versionParts += "0"
        }
        $standardVersion = [string]::Join('.', $versionParts)
        $content += '#define MyAppVersionNumber "' + $standardVersion + '"' + "`n"
        $content += '#define MyAppPublisher "Your Name"' + "`n"
        $content += '#define MyAppExeName "navi.exe"' + "`n"
        $content += "`n"
        $content += '[Setup]' + "`n"
        $content += 'AppId={{com.example.navi}}' + "`n"
        $content += 'AppName={#MyAppName}' + "`n"
        $content += 'AppVersion={#MyAppVersion}' + "`n"
        $content += 'AppVerName={#MyAppName} {#MyAppVersion}' + "`n"
        $content += 'VersionInfoVersion={#MyAppVersionNumber}' + "`n"
        $content += 'UninstallDisplayName={#MyAppName}' + "`n"
        $content += 'UninstallDisplayVersion={#MyAppVersion}' + "`n"
        $content += 'AppPublisher={#MyAppPublisher}' + "`n"
        $content += 'AppMutex=com.example.navi.instance' + "`n"
        $content += 'UninstallDisplayIcon={app}\{#MyAppExeName}' + "`n"
        $content += 'CloseApplications=yes' + "`n"
        $content += 'RestartApplications=no' + "`n"
        $content += 'AllowNetworkDrive=no' + "`n"
        $content += 'UsePreviousAppDir=yes' + "`n"
        $content += 'DisableDirPage=auto' + "`n"
        $content += 'DefaultDirName=D:\{#MyAppName}' + "`n"
        $content += 'DefaultGroupName={#MyAppName}' + "`n"
        $content += 'OutputBaseFilename=navi-setup-' + "${{ github.ref_name }}" + "`n"
        $content += 'OutputDir=Output' + "`n"
        $content += 'Compression=lzma' + "`n"
        $content += 'SolidCompression=yes' + "`n"
        $content += 'WizardStyle=modern' + "`n"
        $content += "`n"
        $content += '[Languages]' + "`n"
        $content += 'Name: "english"; MessagesFile: "compiler:Default.isl"' + "`n"
        $content += 'Name: "chinesesimplified"; MessagesFile: "ChineseSimplified.isl"' + "`n"
        $content += "`n"
        $content += '[Tasks]' + "`n"
        $content += 'Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"' + "`n"
        $content += "`n"
        $content += '[Files]' + "`n"
        $content += 'Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs' + "`n"
        $content += "`n"
        $content += '[Icons]' + "`n"
        $content += 'Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"' + "`n"
        $content += 'Name: "{commondesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon' + "`n"
        $content += '[Code]' + "`n"
        $content += 'function GetNumber(var S: String): Integer;' + "`n"
        $content += 'var' + "`n"
        $content += '  P: Integer;' + "`n"
        $content += '  N: String;' + "`n"
        $content += 'begin' + "`n"
        $content += '  Result := 0;' + "`n"
        $content += '  S := Trim(S);' + "`n"
        $content += '  if Length(S) = 0 then Exit;' + "`n"
        $content += '  P := Pos(''.'', S);' + "`n"
        $content += '  if P = 0 then P := Length(S) + 1;' + "`n"
        $content += '  N := Copy(S, 1, P-1);' + "`n"
        $content += '  if Length(N) > 0 then' + "`n"
        $content += '    Result := StrToIntDef(N, 0);' + "`n"
        $content += '  Delete(S, 1, P);' + "`n"
        $content += 'end;' + "`n"
        $content += "`n"
        $content += 'function CompareVersion(V1, V2: string): Integer;' + "`n"
        $content += 'var' + "`n"
        $content += '  S1, S2: String;' + "`n"
        $content += '  N1, N2: Integer;' + "`n"
        $content += 'begin' + "`n"
        $content += '  Result := 0;' + "`n"
        $content += '  S1 := V1;' + "`n"
        $content += '  S2 := V2;' + "`n"
        $content += '  if Copy(S1, 1, 1) = ''v'' then Delete(S1, 1, 1);' + "`n"
        $content += '  if Copy(S2, 1, 1) = ''v'' then Delete(S2, 1, 1);' + "`n"
        $content += '  repeat' + "`n"
        $content += '    N1 := GetNumber(S1);' + "`n"
        $content += '    N2 := GetNumber(S2);' + "`n"
        $content += '    if N1 < N2 then begin' + "`n"
        $content += '      Result := -1;' + "`n"
        $content += '      Break;' + "`n"
        $content += '    end' + "`n"
        $content += '    else if N1 > N2 then begin' + "`n"
        $content += '      Result := 1;' + "`n"
        $content += '      Break;' + "`n"
        $content += '    end;' + "`n"
        $content += '  until (Length(S1) = 0) and (Length(S2) = 0);' + "`n"
        $content += 'end;' + "`n"
        $content += "`n"
        $content += 'function InitializeSetup(): Boolean;' + "`n"
        $content += 'var' + "`n"
        $content += '  InstalledVersion, InstalledDisplayVersion: String;' + "`n"
        $content += '  CurrentVersion: String;' + "`n"
        $content += '  CompareResult: Integer;' + "`n"
        $content += '  RegKey: String;' + "`n"
        $content += 'begin' + "`n"
        $content += '  Result := True;' + "`n"
        $content += '  RegKey := ''Software\Microsoft\Windows\CurrentVersion\Uninstall\{#SetupSetting("AppId")}_is1'';' + "`n"
        $content += '  if RegKeyExists(HKLM, RegKey) and RegQueryStringValue(HKLM, RegKey, ''DisplayVersion'', InstalledVersion) then' + "`n"
        $content += '  begin' + "`n"
        $content += '    // 保存原始显示版本号' + "`n"
        $content += '    InstalledDisplayVersion := InstalledVersion;' + "`n"
        $content += '    // 标准化版本号用于比较' + "`n"
        $content += '    CurrentVersion := ''{#MyAppVersionNumber}'';' + "`n"
        $content += '    if Copy(InstalledVersion, 1, 1) = ''v'' then' + "`n"
        $content += '      Delete(InstalledVersion, 1, 1);' + "`n"
        $content += '    while WordCount(InstalledVersion, ''.'') < 3 do' + "`n"
        $content += '      InstalledVersion := InstalledVersion + ''.0'';' + "`n"
        $content += '    CompareResult := CompareVersion(InstalledVersion, CurrentVersion);' + "`n"
        $content += '    if CompareResult = 0 then' + "`n"
        $content += '    begin' + "`n"
        $content += '      if MsgBox(Format(''已安装版本：%s'#13#10'当前版本：%s'#13#10#13#10'是否重新安装？'', [InstalledDisplayVersion, ''{#MyAppVersion}'']), mbConfirmation, MB_YESNO) = IDNO then' + "`n"
        $content += '        Result := False;' + "`n"
        $content += '    end' + "`n"
        $content += '    else if CompareResult > 0 then' + "`n"
        $content += '    begin' + "`n"
        $content += '      if MsgBox(Format(''已安装版本：%s'#13#10'当前版本：%s'#13#10#13#10'检测到已安装更高版本，继续安装可能会导致程序无法正常运行。是否继续？'', [InstalledDisplayVersion, ''{#MyAppVersion}'']), mbConfirmation, MB_YESNO) = IDNO then' + "`n"
        $content += '        Result := False;' + "`n"
        $content += '    end;' + "`n"
        $content += '  end;' + "`n"
        $content += 'end;' + "`n"
        $content += "`n"
        $content += 'function PrepareToInstall(var NeedsRestart: Boolean): String;' + "`n"
        $content += 'var' + "`n"
        $content += '  ResultCode: Integer;' + "`n"
        $content += 'begin' + "`n"
        $content += '  Result := '''';' + "`n"
        $content += '  if FileExists(ExpandConstant(''{app}\{#MyAppExeName}'')) then' + "`n"
        $content += '  begin' + "`n"
        $content += '    Exec(ExpandConstant(''{app}\{#MyAppExeName}''), ''/uninstall'', '''', SW_SHOW, ewWaitUntilTerminated, ResultCode);' + "`n"
        $content += '    Sleep(1000);' + "`n"
        $content += '  end;' + "`n"
        $content += 'end;' + "`n"
        Set-Content -Path "installer.iss" -Value $content -Encoding UTF8
        Write-Host "安装脚本创建完成"
        Get-Content "installer.iss"
      shell: pwsh
      
    - name: Build Installer
      run: |
        Write-Host "开始构建安装程序..."
        if (-not (Test-Path "installer.iss")) {
          Write-Error "找不到安装脚本文件"
          exit 1
        }
        if (-not (Test-Path "ChineseSimplified.isl")) {
          Write-Error "找不到中文语言文件"
          exit 1
        }
        Write-Host "检查构建目录..."
        if (-not (Test-Path "build\windows\x64\runner\Release")) {
          Write-Error "找不到构建输出目录"
          exit 1
        }
        Write-Host "运行 Inno Setup 编译器..."
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Q "installer.iss"
        if (-not (Test-Path "Output")) {
          Write-Error "安装程序构建失败"
          exit 1
        }
        Write-Host "安装程序构建完成"
      shell: pwsh

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-artifacts
        path: |
          Output/navi-setup-${{ github.ref_name }}.exe
          Output/navi-portable-${{ github.ref_name }}.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      run: flutter pub get

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/navi.keystore

    - name: Create key.properties
      run: |
        echo "storeFile=navi.keystore" > android/key.properties
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
      
    - name: Build Android APK
      run: flutter build apk --release
      
    - name: Rename APK
      run: |
        mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/navi-${{ github.ref_name }}.apk

    - name: Upload Android Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-artifacts
        path: build/app/outputs/flutter-apk/navi-${{ github.ref_name }}.apk

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts
          path: artifacts/android

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows/navi-setup-${{ github.ref_name }}.exe
            artifacts/windows/navi-portable-${{ github.ref_name }}.zip
            artifacts/android/navi-${{ github.ref_name }}.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## ✨日志

            ### 优化
            - 🎨 优化提示弹窗样式
            - ⚡️ 修复启动时重复加载数据
            - 🐛 优化桌面安装程序

          draft: false
          prerelease: false
          generate_release_notes: false