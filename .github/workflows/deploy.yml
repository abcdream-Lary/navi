name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Build Windows
      run: flutter build windows --release
      
    - name: Download Inno Setup
      run: |
        curl -L -o inno-setup.exe https://files.jrsoftware.org/is/6/innosetup-6.2.2.exe
        .\inno-setup.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
      
    - name: Create Inno Setup Script
      shell: powershell
      run: |
        @'
        #define MyAppName "Navi"
        #define MyAppVersion "${{ github.ref_name }}"
        #define MyAppPublisher "Your Name"
        #define MyAppExeName "navi.exe"

        [Setup]
        AppId={{com.example.navi}}
        AppName={#MyAppName}
        AppVersion={#MyAppVersion}
        AppPublisher={#MyAppPublisher}
        DefaultDirName=D:\{#MyAppName}
        DefaultGroupName={#MyAppName}
        OutputBaseFilename=navi-setup-${{ github.ref_name }}
        Compression=lzma
        SolidCompression=yes
        WizardStyle=modern
        AlwaysShowDirOnReadyPage=yes
        DisableProgramGroupPage=no
        AllowNoIcons=yes

        [Languages]
        Name: "chinesesimplified"; MessagesFile: "compiler:Languages\ChineseSimplified.isl"

        [Tasks]
        Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"

        [Files]
        Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs

        [Icons]
        Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
        Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon
        '@ | Set-Content installer.iss -Encoding UTF8
      
    - name: Build Installer
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: Output/navi-setup-${{ github.ref_name }}.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Build Android APK
      run: flutter build apk --debug  # 临时使用debug模式构建，不需要签名
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: build/app/outputs/apk/debug/app-debug.apk
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false