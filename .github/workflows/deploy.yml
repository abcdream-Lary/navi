name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Build Windows
      run: flutter build windows --release
      
    - name: Download Inno Setup
      run: |
        curl -L -o inno-setup.exe https://files.jrsoftware.org/is/6/innosetup-6.2.2.exe
        .\inno-setup.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
        Copy-Item -Path ".github/workflows/ChineseSimplified.isl" -Destination "ChineseSimplified.isl"
      
    - name: Create Inno Setup Script
      run: |
        New-Item -Path "installer.iss" -ItemType File -Force
        Add-Content -Path "installer.iss" -Value '#define MyAppName "Navi"'
        Add-Content -Path "installer.iss" -Value '#define MyAppVersion "${{ github.ref_name }}"'
        Add-Content -Path "installer.iss" -Value '#define MyAppPublisher "Your Name"'
        Add-Content -Path "installer.iss" -Value '#define MyAppExeName "navi.exe"'
        Add-Content -Path "installer.iss" -Value ''
        Add-Content -Path "installer.iss" -Value '[Setup]'
        Add-Content -Path "installer.iss" -Value 'AppId={{com.example.navi}}'
        Add-Content -Path "installer.iss" -Value 'AppName={#MyAppName}'
        Add-Content -Path "installer.iss" -Value 'AppVersion={#MyAppVersion}'
        Add-Content -Path "installer.iss" -Value 'AppPublisher={#MyAppPublisher}'
        Add-Content -Path "installer.iss" -Value 'DefaultDirName={autopf}\{#MyAppName}'
        Add-Content -Path "installer.iss" -Value 'DefaultGroupName={#MyAppName}'
        Add-Content -Path "installer.iss" -Value 'OutputBaseFilename=navi-setup-${{ github.ref_name }}'
        Add-Content -Path "installer.iss" -Value 'Compression=lzma'
        Add-Content -Path "installer.iss" -Value 'SolidCompression=yes'
        Add-Content -Path "installer.iss" -Value 'WizardStyle=modern'
        Add-Content -Path "installer.iss" -Value ''
        Add-Content -Path "installer.iss" -Value '[Languages]'
        Add-Content -Path "installer.iss" -Value 'Name: "english"; MessagesFile: "compiler:Default.isl"'
        Add-Content -Path "installer.iss" -Value 'Name: "chinesesimplified"; MessagesFile: "ChineseSimplified.isl"'
        Add-Content -Path "installer.iss" -Value ''
        Add-Content -Path "installer.iss" -Value '[Tasks]'
        Add-Content -Path "installer.iss" -Value 'Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"'
        Add-Content -Path "installer.iss" -Value ''
        Add-Content -Path "installer.iss" -Value '[Files]'
        Add-Content -Path "installer.iss" -Value 'Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs'
        Add-Content -Path "installer.iss" -Value ''
        Add-Content -Path "installer.iss" -Value '[Icons]'
        Add-Content -Path "installer.iss" -Value 'Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"'
        Add-Content -Path "installer.iss" -Value 'Name: "{commondesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon'
      shell: pwsh
      
    - name: Build Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: Output/navi-setup-${{ github.ref_name }}.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      run: flutter pub get

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/navi.keystore

    - name: Create key.properties
      run: |
        echo "storeFile=navi.keystore" > android/key.properties
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
      
    - name: Build Android APK
      run: flutter build apk --release
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false